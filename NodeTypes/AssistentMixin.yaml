Sitegeist.Chatterbox:Mixin.Assistant:
  abstract: true
  ui:
    inspector:
      groups:
        chatterbox:
          icon: robot
          label: 'Chatterbox AI Assistants'
          tab: default
  properties:
    chatterboxAssistantId:
      type: string
      ui:
        label: "Assistant ID"
        inspector:
          group: chatterbox
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            dataSourceIdentifier: Sitegeist.Chatterbox:AssistantId
            allowEmpty: true
    chatterboxWelcomeMessage:
      type: string
      ui:
        label: "Welcome Message"
        inspector:
          group: chatterbox
          hidden: "ClientEval: node.properties.chatterboxAssistantId ? false: true"
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
          editorOptions:
            rows: 7
    chatterboxSuggestions:
      type: string
      ui:
        label: "Suggestions"
        inspector:
          group: chatterbox
          hidden: "ClientEval: node.properties.chatterboxAssistantId ? false: true"
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
          editorOptions:
            rows: 7
